  get_it: ^8.0.3
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  logger: ^2.6.0
  pretty_dio_logger: ^1.4.0
  provider: ^6.1.5
  retrofit: ^4.6.0
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.0
  flutter_secure_storage: ^9.2.4
  pin_code_fields: ^8.0.1
  bloc_test: ^10.0.0
  equatable: ^2.0.5
  location: ^8.0.1
  shimmer:
  skeletonizer: ^2.1.0+1
  numberpicker: ^2.1.2
  package_info_plus: ^4.0.0
  lottie: ^3.3.1
  image_picker: ^1.2.0
  dio: ^5.9.0
